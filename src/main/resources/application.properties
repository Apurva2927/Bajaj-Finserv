spring.application.name=webhook-sql-solver
server.port=8080

# H2 Database Configuration
spring.h2.console.enabled=true
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# JWT Configuration
# JWT token expiration time in milliseconds (default: 1 hour = 3600000)
# Maximum allowed: 86400000 (24 hours)
jwt.expiration-time-ms=3600000
jwt.max-expiration-time-ms=86400000
jwt.secret-key=BajajFinservWebhookSecurityKeyForJWTTokenGeneration123

# Logging
logging.level.root=INFO
logging.level.com.bajajfinserv=DEBUG
